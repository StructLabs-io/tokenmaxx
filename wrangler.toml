name = "tokenmaxx"
compatibility_date = "2025-05-29"
compatibility_flags = ["nodejs_compat"]

# Pages-specific: tells wrangler this is a Pages project
# Build output from @cloudflare/next-on-pages lands in .vercel/output/static
pages_build_output_dir = ".vercel/output/static"

# Uncomment and fill in after Supabase is provisioned:
# [vars]
# NEXT_PUBLIC_SUPABASE_URL = "https://your-project.supabase.co"
# NEXT_PUBLIC_SUPABASE_ANON_KEY = "your-anon-key"
#
# Never put secrets here -- use:
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
